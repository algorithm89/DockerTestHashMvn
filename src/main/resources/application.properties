spring.application.name=CrudTest

# --- MySQL DataSource ---
# DB_HOST defaults to localhost (direct run), override for Docker: -e DB_HOST=172.17.0.1
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/testdb
spring.datasource.username=bublik
# password is pulled from Vault automatically at startup (key: spring.datasource.password)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- HashiCorp Vault ---
# VAULT_HOST defaults to 127.0.0.1 (direct run), override for Docker: -e VAULT_HOST=172.17.0.1
spring.cloud.vault.uri=http://${VAULT_HOST:127.0.0.1}:8200
# VAULT_TOKEN must always be set: -e VAULT_TOKEN=hvs.xxx
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=CrudTest
spring.config.import=vault://

# --- Server ---
server.port=8080

# --- Actuator / Health ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.org.crypto.crudtest=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.vault=DEBUG
logging.level.org.springframework.cloud.vault=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
