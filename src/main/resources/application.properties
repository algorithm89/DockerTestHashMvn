spring.application.name=CrudTest

# --- MySQL DataSource ---
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/testdb
spring.datasource.username=bublik
spring.datasource.password=bublik123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- HashiCorp Vault (disabled for direct DB testing) ---
#spring.cloud.vault.uri=http://127.0.0.1:8200
#spring.cloud.vault.enabled=false
#spring.cloud.vault.token=${VAULT_TOKEN:disabled}
#spring.cloud.vault.kv.enabled=false
#spring.cloud.vault.kv.backend=secret
#spring.cloud.vault.kv.default-context=${spring.application.name}
#spring.config.import=optional:vault://

# --- Server ---
server.port=8080

# --- Actuator / Health ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.org.crypto.crudtest=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
