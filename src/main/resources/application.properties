spring.application.name=CrudTest

# --- MySQL DataSource ---
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/testdb
spring.datasource.username=bublik
# password is NOT here - it is pulled from Vault automatically at startup
# Vault key: spring.datasource.password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- HashiCorp Vault ---
spring.cloud.vault.uri=http://127.0.0.1:8200

# VAULT_TOKEN must be set as an environment variable - NEVER hardcode the token here.
#
# ??  Is it safe to run "export VAULT_TOKEN=..."?
#     - In a terminal: yes, but the token will be visible in your shell history (~/.bash_history).
#       To avoid that, add a space before the command or clear history:
#         export VAULT_TOKEN="your-token"   <- visible in history
#          VAULT_TOKEN="your-token" java -jar app.jar  <- inline, safer
#       Or clear it after: history -d $(history 1)
#
# ?  Safer options (recommended for Linux/production):
#     1. Systemd service file:
#           [Service]
#           Environment="VAULT_TOKEN=your-token"
#        The token lives in the service file (not shell history).
#        Protect the file: chmod 600 /etc/systemd/system/crudtest.service
#
#     2. A .env file (never commit to Git!):
#           echo 'VAULT_TOKEN=your-token' > /opt/crudtest/.env
#           chmod 600 /opt/crudtest/.env
#           source /opt/crudtest/.env && java -jar app.jar
#
#     3. IntelliJ (local dev only):
#           Run > Edit Configurations > Environment Variables > add VAULT_TOKEN=your-token
#
# ?  Should you delete the token after exporting?
#     Yes - once the app is running it has already read the token.
#     You can unset it from the shell: unset VAULT_TOKEN
#     But keep it wherever the app is launched from (systemd / .env).
spring.cloud.vault.token=${VAULT_TOKEN}

spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=${spring.application.name}
spring.config.import=vault://

# --- Server ---
server.port=8080

# --- Actuator / Health ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.org.crypto.crudtest=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
