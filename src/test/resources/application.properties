spring.application.name=CrudTest

# --- MySQL DataSource (same as main, password provided directly since Vault is disabled) ---
spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=bublik
spring.datasource.password=bublik123

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Disable Vault for tests (no Vault server needed) ---
spring.cloud.vault.enabled=false
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.compatibility-verifier.enabled=false
spring.config.import=optional:vault://
